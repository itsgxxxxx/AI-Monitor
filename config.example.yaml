# AI Monitor 配置示例（请复制为 config.yaml 后填写真实密钥）
poll_interval_minutes: 30

database:
  path: ./ai_monitor.db

telegram:
  bot_token: "<YOUR_TELEGRAM_BOT_TOKEN>"
  chat_id: "<YOUR_TELEGRAM_CHAT_ID>"

llm:
  api_key: "<YOUR_AIBERM_API_KEY>"
  base_url: "https://api.aiberm.com/v1"
  model: "gpt-5-mini"  # 推荐：gpt-5-mini (月成本约4.6元) 或 gpt-5-nano (月成本约0.9元)
  enabled: false  # 是否启用 LLM 总结功能（设为 true 启用）

# Twikit 配置
twikit:
  cookies_path: "./cookies.json"

http:
  timeout: 20
  user_agent: "ai-monitor/1.0 (+https://example.com)"

sources:
  # Twitter List 监控（推荐使用）
  - name: AI Updates Monitor List
    type: twitter_list
    enabled: true
    list_id: "2028463021480398895"  # 你的 Twitter List ID
    account_categories:
      AI更新监测:
        - claudeai
        - GeminiApp
        - OpenAIDevs
        - OpenAI
        - trq212
        - testingcatalog
        - kimmonismus
        - heyshrutimishra
      AI实用技巧分享:
        - aiedge_
        - slow_developer
        - minchoi
        - AlexFinn
        - DeRonin_
        - dani_avila7
        - heynavtoor
        - hasantoxr
        - heygurisingh
        - ihtesham2005
        - godofprompt
        - PromptLLM
      AI大佬:
        - karpathy
        - rileybrown
